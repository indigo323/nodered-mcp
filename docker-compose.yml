services:
  nodered-mcp:
    build: .
    container_name: nodered-mcp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_RED_URL: ${NODE_RED_URL}
      NODE_RED_USERNAME: ${NODE_RED_USERNAME}
      NODE_RED_PASSWORD: ${NODE_RED_PASSWORD}
      MCP_API_KEY: ${MCP_API_KEY}
      PORT: ${PORT:-3000}
